<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Open When 💌</title>

<style>
body {
  font-family: Arial;
  background: #ffe6f0;
  text-align: center;
  padding: 30px;
}

button {
  background: #ff99cc;
  border: none;
  padding: 15px 25px;
  margin: 10px;
  border-radius: 20px;
  font-size: 16px;
  cursor: pointer;
}

.letter {
  display: none;
  background: white;
  padding: 25px;
  margin-top: 20px;
  border-radius: 15px;
  text-align: left;
}

img {
  width: 100%;
  border-radius: 15px;
  margin-top: 15px;
}

audio {
  margin-top: 15px;
  width: 100%;
}
</style>
</head>

<body>

<h1>Open When 💌</h1>

<button onclick="openLetter('prebday','bubbles')">Open When It's The Day Before Your Birthday</button>
<button onclick="openLetter('heartvoice','Dil kyu yeh mera')">Open To Know My Heart's First Voice</button>
<button onclick="openLetter('fight','I am sorry Sarah')">Open When We Fight</button>
<button onclick="openLetter('doubt','Sarah hai na')">Open When You're Doubting Yourself</button>
<button onclick="openLetter('sad','19163657950')">Open When You're Sad</button>

<!-- PREBDAY -->
<div id="prebday" class="letter">
<h2>Almost Your Birthday 🤍</h2>
<p>Your sweet message here...</p>
<img src="prebday.png">
<audio controls loop>
  <source src="prebday.mp3" type="audio/mpeg">
</audio>
</div>

<!-- HEARTVOICE -->
<div id="heartvoice" class="letter">
<h2>My Heart’s First Voice 🤍</h2>
<p>Your sweet message here...</p>
<img src="heartvoice.png">
<audio controls loop>
  <source src="heartvoice.mp3" type="audio/mpeg">
</audio>
</div>

<!-- FIGHT (no song) -->
<div id="fight" class="letter">
<h2>When We Fight 🤍</h2>
<p>Your message here...</p>
<img src="fight.png">
</div>

<!-- DOUBT (no song) -->
<div id="doubt" class="letter">
<h2>When You’re Doubting Yourself 🤍</h2>
<p>Your message here...</p>
<img src="doubt.png">
</div>

<!-- SAD -->
<div id="sad" class="letter">
<h2>When You’re Sad 🤍</h2>
<p>Your message here...</p>
<img src="sad.png">
<audio controls loop>
  <source src="sad.mp3" type="audio/mpeg">
</audio>
</div>

<script>
function openLetter(id, password) {
  var input = prompt("Enter the password:");
  if (input === password) {

    // Hide all letters
    document.querySelectorAll('.letter').forEach(l => {
      l.style.display = "none";
    });

    // Show selected letter
    document.getElementById(id).style.display = "block";

  } else {
    alert("Wrong password 🤍");
  }
}
</script>

</body>
</html>
